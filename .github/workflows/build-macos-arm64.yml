# Builds the app for macOS on Apple Silicon (arm64) only.
# Produces an unsigned .dmg and .zip (a fork has no Apple Developer cert, so code
# signing and notarization are disabled). Download them from the run's Artifacts.
#
# Because the build is unsigned, after installing, the first launch needs:
#   xattr -dr com.apple.quarantine "/Applications/Wave.app"
# (or right-click the app -> Open).

name: Build macOS (Apple Silicon)
run-name: Build macOS arm64 - ${{ github.ref_name }}

on:
    workflow_dispatch:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+*"

env:
    GO_VERSION: "1.25.6"
    NODE_VERSION: 22
    NODE_OPTIONS: --max-old-space-size=4096

jobs:
    build:
        # macos-14 is an Apple Silicon (arm64) runner.
        runs-on: macos-14
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: go.sum

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install Task
              uses: arduino/setup-task@v2
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            # Avoid ssh-based git dependency fetches during npm ci.
            - name: Force git deps to HTTPS
              run: |
                  git config --global url.https://github.com/.insteadof ssh://git@github.com/
                  git config --global url.https://github.com/.insteadof git@github.com:

            - name: Install node dependencies
              uses: nick-fields/retry@v4
              with:
                  command: npm ci --no-audit --no-fund
                  retry_on: error
                  max_attempts: 3
                  timeout_minutes: 10
              env:
                  GIT_ASKPASS: "echo"
                  GIT_TERMINAL_PROMPT: "0"

            # Builds wavesrv + wsh (Go), the frontend (electron-vite), and packages the
            # macOS arm64 app. "--mac --arm64" restricts electron-builder output to arm64.
            - name: Build and package (macOS arm64)
              run: task package -- --mac --arm64
              env:
                  # No Apple Developer cert in a fork: skip code signing / notarization.
                  CSC_IDENTITY_AUTO_DISCOVERY: "false"

            - name: Upload artifact (.dmg)
              uses: actions/upload-artifact@v5
              with:
                  name: wave-macos-arm64-dmg
                  path: make/*.dmg
                  if-no-files-found: error
                  # the .dmg is already compressed; don't waste time re-compressing it
                  compression-level: 0
