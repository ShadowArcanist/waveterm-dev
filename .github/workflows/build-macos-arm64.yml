# Builds the app for macOS on Apple Silicon (arm64) only and produces a single
# unsigned .dmg (a fork has no Apple Developer cert, so signing/notarization are off).
#
# - On a tag push (vX.Y.Z): the .dmg is attached to a GitHub Release, where it can be
#   downloaded directly as a raw .dmg (this is how the official project distributes).
# - On manual runs (workflow_dispatch): the .dmg is uploaded as a build Artifact. NOTE:
#   GitHub always wraps downloaded Artifacts in a .zip — that zip wrapper is GitHub's,
#   not ours; the .dmg is inside it. Use a tag/Release to get a raw .dmg.
#
# Because the build is unsigned, the first launch needs:
#   xattr -dr com.apple.quarantine "/Applications/Wave.app"
# (or right-click the app -> Open).

name: Build macOS (Apple Silicon)
run-name: Build macOS arm64 - ${{ github.ref_name }}

on:
    workflow_dispatch:
    push:
        tags:
            - "v*"

env:
    GO_VERSION: "1.25.6"
    NODE_VERSION: 22
    NODE_OPTIONS: --max-old-space-size=4096

jobs:
    build:
        # macos-14 is an Apple Silicon (arm64) runner.
        runs-on: macos-14
        permissions:
            contents: write # needed to create the Release on tag pushes
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version: ${{ env.GO_VERSION }}
                  cache-dependency-path: go.sum

            - uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install Task
              uses: arduino/setup-task@v2
              with:
                  version: 3.x
                  repo-token: ${{ secrets.GITHUB_TOKEN }}

            # Avoid ssh-based git dependency fetches during npm ci.
            - name: Force git deps to HTTPS
              run: |
                  git config --global url.https://github.com/.insteadof ssh://git@github.com/
                  git config --global url.https://github.com/.insteadof git@github.com:

            - name: Install node dependencies
              uses: nick-fields/retry@v4
              with:
                  command: npm ci --no-audit --no-fund
                  retry_on: error
                  max_attempts: 3
                  timeout_minutes: 10
              env:
                  GIT_ASKPASS: "echo"
                  GIT_TERMINAL_PROMPT: "0"

            # Builds wavesrv + wsh (Go), the frontend (electron-vite), and packages the
            # macOS app. The electron-builder config is pinned to arm64-only, so exactly
            # one arm64 .dmg is produced.
            - name: Build and package (macOS arm64)
              run: task package -- --mac --arm64
              env:
                  # No Apple Developer cert in a fork: skip code signing / notarization.
                  CSC_IDENTITY_AUTO_DISCOVERY: "false"

            - name: Show artifact sizes
              run: ls -lh make/*.dmg

            # Raw, directly-downloadable .dmg (no zip wrapper) — tag pushes only.
            - name: Publish .dmg to GitHub Release
              if: startsWith(github.ref, 'refs/tags/')
              uses: softprops/action-gh-release@v2
              with:
                  name: Wave Terminal ${{ github.ref_name }}
                  generate_release_notes: true
                  files: make/*.dmg

            # Manual runs: upload as a build Artifact (GitHub serves this as a .zip).
            - name: Upload .dmg artifact
              if: ${{ !startsWith(github.ref, 'refs/tags/') }}
              uses: actions/upload-artifact@v5
              with:
                  name: wave-macos-arm64-dmg
                  path: make/*.dmg
                  if-no-files-found: error
                  # the .dmg is already compressed; don't waste time re-compressing it
                  compression-level: 0
